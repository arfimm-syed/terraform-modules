trigger:
  - main

variables:
  azureServiceConnection: "tf-module"
  terraformWorkingDirectory: "$(System.DefaultWorkingDirectory)/parent_module"

stages:
  - stage: Deploy
    displayName: "Terraform Deploy (Auto Apply)"

    jobs:
      - job: Terraform
        pool:
          vmImage: "ubuntu-latest"

        steps:

          - checkout: self

          # Install Terraform
          - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
            inputs:
              terraformVersion: "1.15.7"


          # Debug - verify Terraform files
          - script: |
              echo "Current directory:"
              pwd

              echo "Terraform directory:"
              ls -la $(terraformWorkingDirectory)

              echo "Terraform files:"
              find $(terraformWorkingDirectory) -name "*.tf"
            displayName: "Verify Terraform Files"


          # Init
          - task: TerraformTask@5
            displayName: Init
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(terraformWorkingDirectory)"
              backendServiceArm: "$(azureServiceConnection)"
              backendAzureRmResourceGroupName: "rg-backend"
              backendAzureRmStorageAccountName: "arfimmltdstorage"
              backendAzureRmContainerName: "prod-tfstate"
              backendAzureRmKey: "tfmodule.tfstate"


          # Validate
          - task: TerraformTask@5
            displayName: Validate
            inputs:
              provider: "azurerm"
              command: "validate"
              workingDirectory: "$(terraformWorkingDirectory)"


          # Plan
          - task: TerraformTask@5
            displayName: Plan
            inputs:
              provider: "azurerm"
              command: "plan"
              workingDirectory: "$(terraformWorkingDirectory)"
              environmentServiceNameAzureRM: "$(azureServiceConnection)"


          # Apply
          - task: TerraformTask@5
            displayName: Apply
            inputs:
              provider: "azurerm"
              command: "apply"
              workingDirectory: "$(terraformWorkingDirectory)"
              args: "-auto-approve"
              environmentServiceNameAzureRM: "$(azureServiceConnection)"
